<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #div1{
            display: flex;
            justify-content: flex-start;
            width: 300px;
            height: 200px;
            border-radius: 50%;
            background: linear-gradient(to right, #000 50%, #fff 50%);
            background-size: 200% 100%;
            background-position: bottom right;
            transition: all .7s ease-out;
        }


.heart-shape:hover, .heart-shape:hover:before, .heart-shape:hover:after{
            background: radial-gradient(at 30% -40px, green 34%, blue 87%);
            background-position: bottom left;
            background-size: 100% 100%;
            transition: all .7s ease-out;
        }


.heart-shape{
  position: absolute;
  top: 200px;
  left: 100px;
  width: 20px;
  height: 20px;
  transform: rotate(45deg);
  background-color: rgba(250,184,66, 1);
}

.heart-shape:before,
.heart-shape:after{
  position: absolute;
  width: 20px;
  height: 20px;
  content: '';
  border-radius: 50%;
  background-color: rgba(250,184,66, 1);
}
.heart-shape:before{
  bottom: 0px;
  left: -10px;
}
.heart-shape:after{
  top: -10px;
  right: 0px;
}



    </style>
</head>
<body>
    <div class="heart-shape"></div>
</body>
</html>
